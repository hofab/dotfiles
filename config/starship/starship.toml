add_newline = false

palette = "catppuccin_latte"

# Order of modules on prompt
format = """\
        $time\
        $directory\
        $git_branch\
        $git_status\
        $python\
        \n$status\
        $character\
    """

# Generic prompt configurations
[character]
success_symbol = "[Óāī](fg:green)"
error_symbol = "[[Óāī](bg:#ff3322 fg:#3a3a3a)Óāī](fg:#ff3322)"
format = "[[](bg:#3a3a3a)$symbol]($style)"
# success_symbol = "[](green)"
# error_symbol = "[‚ĚĮ](red)"
# vimcmd_symbol = "[‚Ěģ](green)"

[time]
disabled = false
style = "bg:mauve fg:base"
format = '[$time]($style)'
time_format = '%m/%d/%R'
utc_time_offset = '-5'

[line_break]
disabled = true

[directory]
style = "italic bg:#3a3a3a fg:#dadada"
truncation_length = 3
truncation_symbol = "/"
# fish_style_pwd_dir_length = 1
format = "([[Óāī](bg:#3a3a3a fg:#3a3a3a)]($read_only_style))[[Óāī](bg:#3a3a3a fg:mauve)$path[Óāī](bg:#008700 fg:#3a3a3a)]($style)"

[directory.substitutions]
"~/Downloads" = "ÔÉ≠ "
"~/projects" = "ÔĄ° "
"~" = "ÔĎ≠ "

[git_branch]
symbol = "Ôźė"
style = "bg:#008700 fg:#dadada"
# truncation_length = 4
# truncation_symbol = ""
format = "[$symbol$branch[Óāī](bg:pink fg:#008700)]($style)"

[git_status]
style = "bg:pink fg:text"
stashed = "ÔÄú${count}"
ahead = "Ô≤ó${count}"
behind = "‚Ü° ${count}"
diverged = "‚ÜĒ ${ahead_count} ${behind_count}"
conflicted = "‚Č†${count}"
deleted = "ÔÄć${count}"
renamed = "r${count}"
modified = "ÓėŹ${count}"
staged = "‚éÜ ${count}"
untracked = "‚á™ ${count}"
format = "([(bg:text fg:pink)$all_status[Óāī](fg:pink)]($style))"

[status]
disabled = false
symbol = ""
style = "bg:#3a3a3a fg:#ff3322"
format = "[$symbol$status]($style)"

