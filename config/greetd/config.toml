[terminal]
# The VT to run the greeter on. Can be "next", "current" or a number
# designating the VT.
vt = 1

# The default session, also known as the greeter.
[default_session]
user = "greeter"
command = "tuigreet --time --theme 'title=yellow;border=gray;prompt=yellow;time=yellow;button=gray' --cmd startx"

